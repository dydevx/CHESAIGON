<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chè Sài Gòn </title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* --- Reset & Global --- */
  :root {
    --primary-color: #355E3B; /* Xanh lá thẫm sang trọng (Hunter Green) */
    --accent-color: #C19A6B;  /* Màu đồng/be đậm (Camel) */
    --text-main: #2C2C2C;     /* Đen nhẹ (Charcoal) */
    --text-muted: #666666;   /* Xám (Muted Grey) */
    --bg-light: #FBF9F6;      /* Màu kem nhạt (Off-White) */
    --bg-white: #FFFFFF;
    --font-heading: 'Playfair Display', serif;
    --font-body: 'Inter', sans-serif;
    --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background-color: var(--bg-light);
    color: var(--text-main);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* --- Navbar (Thanh điều hướng) --- */
  .navbar {
    position: fixed;
    top: 0; width: 100%;
    padding: 20px 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(251, 249, 246, 0.95); /* Semi-transparent */
    backdrop-filter: blur(10px);
    z-index: 1000;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .logo {
    font-family: var(--font-heading);
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-color);
    text-decoration: none;
    letter-spacing: -0.5px;
  }

  .nav-links {
    display: flex;
    gap: 30px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--text-main);
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: var(--transition);
  }

  .nav-links a:hover {
    color: var(--accent-color);
  }

  /* --- HERO SECTION --- */
  .hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 140px 10% 60px; /* Thêm padding top cho Navbar */
    min-height:100vh;
    background-color: var(--bg-light);
  }

  .hero-text{
    max-width:580px;
    flex: 1;
  }

  .hero-text h1{
    font-family: var(--font-heading);
    font-size: clamp(40px, 6vw, 64px); /* Responzivní, lớn hơn */
    color: var(--primary-color);
    margin-bottom: 25px;
    line-height: 1.1;
    font-weight: 500;
    letter-spacing: -1px;
  }

  .hero-text p{
    font-size: 19px;
    color: var(--text-muted);
    margin-bottom: 40px;
    line-height: 1.7;
    font-weight: 300;
    max-width: 500px;
  }

  /* --- BUTTONS --- */
  .btn{
    display: inline-block;
    background-color: var(--primary-color);
    color: var(--bg-white);
    padding: 18px 45px;
    border: 1px solid var(--primary-color);
    border-radius: 4px; /* Bo góc vuông vắn hơn */
    cursor:pointer;
    font-size: 15px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: var(--transition);
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(53, 94, 59, 0.15);
  }

  .btn:hover{
    background-color: transparent;
    color: var(--primary-color);
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(53, 94, 59, 0.2);
  }

  /* --- IMAGE --- */
  .hero-img {
    flex: 1;
    display: flex;
    justify-content: flex-end;
    position: relative;
  }

  /* Tạo một vòng tròn trang trí phía sau hình ảnh */
  .hero-img::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-30%, -50%);
    width: 100%; height: 100%;
    background-color: #EAE3D9; /* Màu nền trang trí nhẹ */
    border-radius: 50%;
    z-index: 1;
  }

  .hero-img img{
    width: 550px;
    max-width:100%;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 15px 35px rgba(0,0,0,0.12));
    animation: float 5s ease-in-out infinite;
  }

  @keyframes float{
    0%, 100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-20px) rotate(1deg)}
  }

  /* --- POPUP (Minimal & Elegant) --- */
  .popup{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(44, 44, 44, 0.8); /* Tối hơn và mờ hơn */
    display:none;
    justify-content:center;
    align-items:center;
    z-index: 2000;
    backdrop-filter: blur(8px);
  }

  .popup-box{
    background: var(--bg-white);
    padding: 60px 50px;
    border-radius: 8px; /* Vuông vắn hơn */
    text-align:center;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    animation: zoomIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .popup-box h3{
    font-family: var(--font-heading);
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 30px;
    color: var(--text-main);
    letter-spacing: -0.5px;
  }

  .platform-link {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 15px 0;
    padding: 18px;
    border-radius: 4px;
    text-decoration: none;
    color: var(--bg-white);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
    transition: var(--transition);
    border: 1px solid transparent;
  }

  .platform-link:hover {
    transform: translateY(-3px);
    opacity: 0.95;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }

  /* Màu sắc nền nã hơn cho nền tảng */
  .foodora{background-color: #D61F69; border-color: #D61F69;}
  .wolt{background-color: #0084BF; border-color: #0084BF;}

  .close-btn{
    margin-top: 25px;
    background-color: transparent;
    color: var(--text-muted);
    padding: 10px 20px;
    border: none;
    box-shadow: none;
    font-size: 13px;
    letter-spacing: 1px;
  }
  
  .close-btn:hover {
    background-color: #F0F0F0;
    color: var(--text-main);
    box-shadow: none;
    transform: none;
  }

  /* X nút đóng ở góc */
  .popup-close-icon {
    position: absolute;
    top: 20px; right: 20px;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-muted);
    transition: var(--transition);
  }
  .popup-close-icon:hover { color: var(--text-main); }

  /* --- RESPONSIVE --- */
  @media(max-width: 1024px){
    .hero { padding: 120px 5% 60px; }
    .hero-img img { width: 450px; }
  }

  @media(max-width: 900px){
    .navbar { padding: 15px 5%; }
    .nav-links { display: none; } /* Ẩn menu trên mobile cho đơn giản */
    
    .hero{
      flex-direction: column-reverse; /* Đưa hình ảnh lên trên trên mobile */
      text-align:center;
      padding-top: 100px;
      justify-content: center;
    }
    .hero-img{
      justify-content: center;
      margin-top: 0;
      margin-bottom: 50px;
    }
    .hero-img::after { width: 100%; height: 100%; transform: translate(-50%, -50%); }
    .hero-img img { width: 320px; }
    
    .hero-text { display: flex; flex-direction: column; align-items: center; }
    .hero-text p { margin-left: auto; margin-right: auto; }
  }
</style>
</head>

<section class="hero">
  <div class="hero-text">
    <h1>Chè Sài Gòn</h1>
    <p>Objevte sofistikovanou harmonii chutí v srdci Prahy. Tradiční receptury v moderním, elegantním pojetí.</p>
    <button class="btn" onclick="openPopup()">Objednat online</button>
  </div>

  <div class="hero-img">
    <img src="xóa nền.png" alt="Elegatní vietnamský dezert Chè Sài Gòn">
  </div>
</section>

<div class="popup" id="popup" onclick="closePopupOutside(event)">
  <div class="popup-box" onclick="event.stopPropagation()">
    <div class="popup-close-icon" onclick="closePopup()">&times;</div>
    <h3>Vyberte platformu</h3>

    <a class="platform-link foodora" href="https://www.foodora.cz/restaurant/x06o/che-sai-gon-sapa" target="_blank">
      Objednat přes Foodora
    </a>

    <a class="platform-link wolt" href="https://wolt.com/cs/cze/prague/restaurant/che-sai-gon" target="_blank">
      Objednat přes Wolt
    </a>

    <button class="btn close-btn" onclick="closePopup()">Zavřít</button>
  </div>
</div>

<script>
const popup = document.getElementById('popup');

function openPopup(){
  popup.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePopup(){
  popup.style.display = 'none';
  document.body.style.overflow = 'auto';
}

function closePopupOutside(event) {
  if (event.target === popup) {
    closePopup();
  }
}
</script>

</body>
</html>
